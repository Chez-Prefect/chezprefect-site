<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chez Prefect</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Courier New',monospace; }
  canvas { display:block; position:absolute; inset:0; }
  #ui { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:space-between; padding:1.8rem 2.2rem; pointer-events:none; color:white; }
  #top { display:flex; justify-content:space-between; font-size:.6rem; letter-spacing:.2em; opacity:.4; }
  #bottom { display:flex; justify-content:space-between; font-size:.55rem; letter-spacing:.16em; opacity:.3; }
  #aurora-dot { display:inline-block; width:5px; height:5px; border-radius:50%; background:#00ffb8; box-shadow:0 0 6px #00ffb8; margin-right:.45rem; animation:blink 2s ease-in-out infinite; }
  @keyframes blink { 0%,100%{opacity:.3} 50%{opacity:1} }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="top"><span>58.3005° N  134.4197° W</span><span id="clock"></span></div>
  <div id="bottom"><span><span id="aurora-dot"></span>AURORA MONITOR ACTIVE</span><span>JUNEAU · ALASKA</span></div>
</div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H;
function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
resize(); window.addEventListener('resize',resize);

function updateClock(){ document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})+' AKDT'; }
setInterval(updateClock,1000); updateClock();

// --- ASTRONOMY ENGINE (KEEPING YOUR ACCURATE STARS) ---
const LAT_R=58.3005*Math.PI/180, LON=-134.4197, SKY_F=0.55;
function jd(d){ return d.getTime()/86400000+2440587.5; }
function lst(date){ const j=jd(date),T=(j-2451545)/36525; return((280.46061837+360.98564736629*(j-2451545)+T*T*.000387933+LON)%360+360)%360; }
function raDecToAltAz(ra,dec,date){
  const ha=((lst(date)-ra*15)+360)%360*Math.PI/180,dr=dec*Math.PI/180;
  const sa=Math.sin(dr)*Math.sin(LAT_R)+Math.cos(dr)*Math.cos(LAT_R)*Math.cos(ha);
  const alt=Math.asin(Math.max(-1,Math.min(1,sa)))*180/Math.PI;
  const ca=(Math.sin(dr)-Math.sin(alt*Math.PI/180)*Math.sin(LAT_R))/(Math.cos(alt*Math.PI/180)*Math.cos(LAT_R));
  let az=Math.acos(Math.max(-1,Math.min(1,ca)))*180/Math.PI;
  if(Math.sin(ha)>0) az=360-az;
  return{alt,az};
}
function project(alt,az){
  if(alt<-2)return null;
  const skyB=H*SKY_F;
  return{x:W/2+((((az-180+180)%360)-180)/100)*(W/2),y:skyB-(Math.max(0,alt)/90)*skyB*.92};
}
const STARS=[
  {n:'Dubhe',ra:11.0621,dec:61.751,mag:1.8},{n:'Merak',ra:11.0307,dec:56.383,mag:2.4},
  {n:'Phecda',ra:11.8976,dec:53.695,mag:2.4},{n:'Megrez',ra:12.2574,dec:57.033,mag:3.3},
  {n:'Alioth',ra:12.9004,dec:55.960,mag:1.8},{n:'Mizar',ra:13.3988,dec:54.926,mag:2.1},
  {n:'Alkaid',ra:13.7923,dec:49.314,mag:1.9},{n:'Polaris',ra:2.5302,dec:89.264,mag:2.0}
];
let spos={};
function updatePos(){ const now=new Date(); STARS.forEach(s=>{spos[s.n]={...raDecToAltAz(s.ra,s.dec,now),mag:s.mag};}); }
updatePos(); setInterval(updatePos,15000);

const bgStars=Array.from({length:200},()=>({x:Math.random(),y:Math.random(),r:Math.random()*.8+.2,a:Math.random()*.4,ts:Math.random()*.002,tp:Math.random()*Math.PI*2}));

// --- AURORA & COMETS ---
const aWaves=[{y:.05,amp:30,freq:.002,spd:.0002,color:[0,255,160],w:120,ph:0},{y:.08,amp:40,freq:.0015,spd:.0003,color:[120,60,255],w:150,ph:3}];
const comets=[];
function spawnComet(){ comets.push({x:Math.random()*W,y:Math.random()*H*.3,vx:(Math.random()*4+2)*(Math.random()<.5?1:-1),vy:Math.random()*1.5,len:Math.random()*100+50,alpha:1,r:Math.random()}); }
setInterval(()=>Math.random()<.3&&spawnComet(),8000);

// --- NEW SCENE RENDERING (MATCHING YOUR IMAGE) ---
function drawMountain(x, y, width, height, color, snow = false) {
    ctx.beginPath();
    ctx.moveTo(x - width/2, y);
    ctx.lineTo(x, y - height);
    ctx.lineTo(x + width/2, y);
    ctx.fillStyle = color;
    ctx.fill();
    if(snow) {
        ctx.beginPath();
        ctx.moveTo(x, y - height);
        ctx.lineTo(x - width/8, y - height*0.75);
        ctx.lineTo(x + width/8, y - height*0.75);
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fill();
    }
}

function drawTree(x, y, scale) {
    const h = 40 * scale;
    const w = 15 * scale;
    ctx.fillStyle = "#142d16";
    // Three tiers of branches
    for(let i=0; i<3; i++) {
        ctx.beginPath();
        ctx.moveTo(x, y - h + (i*h*0.25));
        ctx.lineTo(x - w*(1+i*0.2), y - h + (i+1.2)*h*0.35);
        ctx.lineTo(x + w*(1+i*0.2), y - h + (i+1.2)*h*0.35);
        ctx.fill();
    }
}

function drawLandscape() {
    const gy = H * SKY_F;
    
    // 1. Far Ground
    ctx.fillStyle = "#1e3d20";
    ctx.fillRect(0, gy, W, H - gy);

    // 2. Mountains (Matching the 3 peaks in your image)
    drawMountain(W*0.25, gy+10, W*0.5, H*0.25, "#3a506b", true);
    drawMountain(W*0.5, gy+10, W*0.6, H*0.35, "#2c3e50", true);
    drawMountain(W*0.75, gy+10, W*0.5, H*0.25, "#3a506b", true);

    // 3. Winding Road (The S-Curve)
    ctx.beginPath();
    ctx.moveTo(W*0.48, gy); // Horizon start
    ctx.bezierCurveTo(W*0.48, gy + H*0.1, W*0.3, gy + H*0.15, W*0.5, gy + H*0.25);
    ctx.bezierCurveTo(W*0.7, gy + H*0.35, W*0.3, H*0.9, W*0.6, H);
    
    ctx.shadowBlur = 15; ctx.shadowColor = "black";
    ctx.strokeStyle = "#1a1a1a";
    ctx.lineWidth = W * 0.12; ctx.stroke(); // Asphalt
    ctx.strokeStyle = "#333";
    ctx.lineWidth = W * 0.10; ctx.stroke(); // Inner road
    ctx.shadowBlur = 0;

    // 4. Forest (Random but structured)
    for(let i=0; i<60; i++) {
        const tx = (i * 137.5) % W;
        const ty = gy + (i * 23) % (H - gy);
        // Avoid the road path roughly
        if (Math.abs(tx - W*0.5) > W*0.1) {
            drawTree(tx, ty, 0.5 + (ty-gy)/(H-gy));
        }
    }

    // 5. The Bus (VW Style from image)
    const bx = W*0.52, by = H*0.82;
    ctx.save();
    ctx.translate(bx, by);
    ctx.rotate(0.1);
    ctx.fillStyle = "#aed9e0"; // Light Blue
    ctx.roundRect(-25, -15, 50, 30, 8); ctx.fill();
    ctx.fillStyle = "white";
    ctx.roundRect(-25, -15, 50, 12, 5); ctx.fill();
    ctx.fillStyle = "#333"; // Windows
    ctx.fillRect(-18, -10, 8, 6); ctx.fillRect(-2, -10, 8, 6); ctx.fillRect(14, -10, 8, 6);
    ctx.restore();
}

let t=0;
function frame(){
  ctx.clearRect(0,0,W,H);
  
  // Sky Gradient
  const h=new Date().getHours();
  const skyG=ctx.createLinearGradient(0,0,0,H*SKY_F);
  skyG.addColorStop(0,"#000005"); skyG.addColorStop(1,"#051020");
  ctx.fillStyle=skyG; ctx.fillRect(0,0,W,H);

  // Aurora
  aWaves.forEach(b=>{
    ctx.beginPath(); ctx.moveTo(0,H*b.y);
    for(let x=0;x<=W;x+=10) ctx.lineTo(x,H*b.y+Math.sin(b.freq*x+b.ph+t*b.spd)*b.amp);
    ctx.strokeStyle=`rgba(${b.color[0]},${b.color[1]},${b.color[2]},0.15)`;
    ctx.lineWidth=b.w; ctx.stroke();
  });

  // Accurate Stars
  STARS.forEach((s,i)=>{
    const p=spos[s.n]; if(!p) return;
    const c=project(p.alt,p.az); if(!c) return;
    const tw=.7+.3*Math.sin(t*.001+i);
    ctx.beginPath(); ctx.arc(c.x,c.y,1.5,0,Math.PI*2);
    ctx.fillStyle=`rgba(255,255,255,${tw})`; ctx.fill();
  });

  // Comets
  for(let i=comets.length-1;i>=0;i--){
    const c=comets[i];
    ctx.beginPath(); ctx.moveTo(c.x,c.y); ctx.lineTo(c.x-c.len*(c.vx/5),c.y-c.len*(c.vy/5));
    ctx.strokeStyle=`rgba(255,255,255,${c.alpha})`; ctx.stroke();
    c.x+=c.vx; c.y+=c.vy; c.alpha-=.005; if(c.alpha<=0) comets.splice(i,1);
  }

  drawLandscape();
  t+=16; requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
