<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Chez Prefect</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#000; overflow:hidden; width:100vw; height:100vh; font-family:'Courier New',monospace; }
  canvas { display:block; position:absolute; inset:0; }
  #ui { position:absolute; inset:0; display:flex; flex-direction:column; justify-content:space-between; padding:1.8rem 2.2rem; pointer-events:none; color:white; z-index: 10; }
  #top { display:flex; justify-content:space-between; font-size:.6rem; letter-spacing:.2em; opacity:.4; }
  #bottom { display:flex; justify-content:space-between; font-size:.55rem; letter-spacing:.16em; opacity:.3; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="top"><span>58.3005° N  134.4197° W</span><span id="clock"></span></div>
  <div id="bottom"><span>AURORA MONITOR ACTIVE</span><span>JUNEAU · ALASKA</span></div>
</div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d');
let W,H;
function resize(){ W=cv.width=window.innerWidth; H=cv.height=window.innerHeight; }
resize(); window.addEventListener('resize',resize);

function updateClock(){ document.getElementById('clock').textContent=new Date().toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false})+' AKDT'; }
setInterval(updateClock,1000); updateClock();

const SKY_F = 0.55;

// --- PERSPECTIVE LANDSCAPE ---
function drawMountain(x, y, w, h, col) {
    ctx.fillStyle = col;
    ctx.beginPath();
    ctx.moveTo(x - w, y);
    ctx.lineTo(x, y - h);
    ctx.lineTo(x + w, y);
    ctx.fill();
    // Shaded side
    ctx.fillStyle = 'rgba(0,0,0,0.15)';
    ctx.beginPath();
    ctx.moveTo(x, y - h);
    ctx.lineTo(x + w, y);
    ctx.lineTo(x, y);
    ctx.fill();
    // Snow cap
    ctx.fillStyle = '#d0e1eb';
    ctx.beginPath();
    ctx.moveTo(x, y - h);
    ctx.lineTo(x - w * 0.2, y - h * 0.8);
    ctx.lineTo(x + w * 0.2, y - h * 0.8);
    ctx.fill();
}

function drawLandscape() {
    const gy = H * SKY_F;
    
    // Mountains
    drawMountain(W * 0.2, gy + 20, W * 0.3, H * 0.22, '#3a506b');
    drawMountain(W * 0.8, gy + 20, W * 0.3, H * 0.22, '#3a506b');
    drawMountain(W * 0.5, gy + 20, W * 0.4, H * 0.35, '#2c3e50'); // Center peak

    // Ground
    ctx.fillStyle = '#1b331b';
    ctx.fillRect(0, gy, W, H - gy);

    // Winding Road (Fixed perspective S-curve)
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(W * 0.5, gy);
    // Perspective curve: Narrow at top, wide at bottom
    ctx.bezierCurveTo(W * 0.5, gy + H * 0.1, W * 0.2, gy + H * 0.15, W * 0.45, gy + H * 0.25);
    ctx.bezierCurveTo(W * 0.75, gy + H * 0.35, W * 0.1, H, W * 0.6, H + 100);
    
    ctx.lineCap = 'round';
    ctx.shadowBlur = 40; ctx.shadowColor = 'rgba(0,0,0,0.5)';
    ctx.strokeStyle = '#111'; ctx.lineWidth = W * 0.15; ctx.stroke();
    ctx.strokeStyle = '#222'; ctx.lineWidth = W * 0.13; ctx.stroke();
    ctx.shadowBlur = 0;
    
    // Road Markings
    ctx.setLineDash([20, 30]);
    ctx.strokeStyle = 'rgba(255,255,255,0.05)';
    ctx.lineWidth = 2; ctx.stroke();
    ctx.restore();

    // The Bus (VW Style)
    ctx.save();
    ctx.translate(W * 0.52, H * 0.85);
    ctx.fillStyle = '#aed9e0'; ctx.roundRect(-20, -12, 40, 24, 6); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.roundRect(-20, -12, 40, 10, 4); ctx.fill();
    ctx.restore();
}

function frame() {
    ctx.clearRect(0, 0, W, H);
    
    // Sky
    const g = ctx.createLinearGradient(0, 0, 0, H * SKY_F);
    g.addColorStop(0, '#02040a'); g.addColorStop(1, '#0b182b');
    ctx.fillStyle = g; ctx.fillRect(0, 0, W, H);

    drawLandscape();
    requestAnimationFrame(frame);
}
frame();
</script>
</body>
</html>
