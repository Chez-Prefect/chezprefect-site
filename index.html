<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chez Prefect | Juneau Transit</title>
    <style>
        body { margin: 0; background: #0b141a; overflow: hidden; font-family: 'Courier New', monospace; }
        #stage { width: 100vw; height: 100vh; position: relative; display: flex; align-items: center; justify-content: center; }
        
        /* The circular portal matching your image */
        #portal {
            width: 90vh; height: 90vh;
            max-width: 95vw; max-height: 95vw;
            border-radius: 50%;
            background: #1a2a3a; /* Night sky color from image */
            position: relative;
            overflow: hidden;
            border: 8px solid #080f08;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }

        /* UI Overlays */
        #ui { position: absolute; inset: 0; padding: 2rem; pointer-events: none; color: white; z-index: 100; text-transform: uppercase; }
        .top-bar { display: flex; justify-content: space-between; font-size: 10px; opacity: 0.4; letter-spacing: 2px; }
        .bottom-bar { position: absolute; bottom: 2rem; left: 2rem; right: 2rem; display: flex; justify-content: space-between; font-size: 10px; opacity: 0.4; }

        /* SVG Layers */
        svg { position: absolute; bottom: 0; left: 0; width: 100%; height: 100%; }
        
        /* Animation for the UFO sign */
        @keyframes beamFade {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
        .coming-soon { font-weight: bold; fill: #00ffb8; filter: drop-shadow(0 0 5px #00ffb8); animation: beamFade 2s infinite; }
    </style>
</head>
<body>

<div id="stage">
    <div id="portal">
        <svg viewBox="0 0 500 500" preserveAspectRatio="xMidYMid slice">
            <g fill="white" opacity="0.8">
                <circle cx="200" cy="80" r="1.5" />
                <circle cx="230" cy="90" r="1.5" />
                <circle cx="250" cy="100" r="1.5" />
                <circle cx="270" cy="115" r="2" />
                <circle cx="310" cy="110" r="2" />
                <circle cx="320" cy="140" r="2" />
                <circle cx="280" cy="145" r="2" />
            </g>

            <path d="M-50 300 L50 180 L150 280 L250 120 L380 280 L450 160 L550 300 Z" fill="#6b8ca6" /> <path d="M50 180 L20 220 L80 220 Z M250 120 L210 170 L290 170 Z M450 160 L420 200 L480 200 Z" fill="white" opacity="0.9" /> <rect x="0" y="280" width="500" height="220" fill="#4d7d4d" />

            <path d="M250 280 Q250 350 150 380 T250 500" fill="none" stroke="#2a2e2a" stroke-width="60" />
            <path d="M250 280 Q250 350 150 380 T250 500" fill="none" stroke="#3d423d" stroke-width="50" />
            <path d="M250 280 Q250 350 150 380 T250 500" fill="none" stroke="#f0c040" stroke-width="1" stroke-dasharray="10,10" opacity="0.3" />

            <g id="forest"></g>

            <g transform="translate(260, 420) scale(0.6)">
                <rect x="0" y="0" width="60" height="35" rx="10" fill="#a0d8ef" />
                <rect x="0" y="0" width="60" height="15" rx="5" fill="white" />
                <rect x="10" y="5" width="10" height="8" fill="#333" />
                <rect x="25" y="5" width="10" height="8" fill="#333" />
                <rect x="40" y="5" width="10" height="8" fill="#333" />
            </g>

            <g id="ufo-group" style="cursor: pointer;">
                <ellipse cx="250" cy="50" rx="20" ry="6" fill="#111" stroke="#00ffb8" />
                <path d="M250 56 L200 280 L300 280 Z" fill="url(#beamGradient)" opacity="0.3" />
                <text x="250" y="260" text-anchor="middle" class="coming-soon" font-size="18">COMING SOON</text>
            </g>

            <defs>
                <linearGradient id="beamGradient" x1="0" y1="0" x2="0" y2="1">
                    <stop offset="0%" stop-color="#00ffb8" />
                    <stop offset="100%" stop-color="#00ffb8" stop-opacity="0" />
                </linearGradient>
            </defs>
        </svg>
    </div>

    <div id="ui">
        <div class="top-bar">
            <span>58.3005° N 134.4197° W</span>
            <span id="clock">00:00:00 AKDT</span>
        </div>
        <div class="bottom-bar">
            <span>Aurora Monitor Active</span>
            <span>Juneau, Alaska</span>
        </div>
    </div>
</div>

<script>
    // Populate the forest with varying tree sizes
    const forest = document.getElementById('forest');
    for(let i=0; i<100; i++) {
        const x = Math.random() * 500;
        const y = 280 + Math.random() * 220;
        // Don't draw trees on the road
        if (x > 180 && x < 320 && y > 300) continue; 
        
        const size = 10 + (y - 280) * 0.2;
        const tree = document.createElementNS("http://www.w3.org/2000/svg", "path");
        tree.setAttribute("d", `M${x} ${y} L${x-size/2} ${y+size} L${x+size/2} ${y+size} Z`);
        tree.setAttribute("fill", "#1b331b");
        forest.appendChild(tree);
    }

    // Clock update
    function updateClock() {
        const now = new Date();
        document.getElementById('clock').textContent = now.toLocaleTimeString('en-US', { hour12: false }) + " AKDT";
    }
    setInterval(updateClock, 1000);
    updateClock();
</script>

</body>
</html>
