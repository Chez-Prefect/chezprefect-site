<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chez Prefect</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; overflow: hidden; }
        #root { width: 100%; height: 100%; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const SKY_STATES = {
            aurora:      { label:"Transit Log", condition:"Orbital Aurora Active", skyStops:[[0,'#000205'],[0.5,'#010409'],[1,'#020814']], stars:true,  aurora:true,  sun:false,    rim:'rgba(0,255,184,0.3)' },
            midnight:    { label:"Deep Space",      condition:"System Nominal",      skyStops:[[0,'#000000'],[0.5,'#000103'],[1,'#000205']], stars:true,  aurora:false, sun:false,    rim:'rgba(255,255,255,0.03)' },
            sunrise:     { label:"Earth Departure", condition:"Atmospheric Break",  skyStops:[[0,'#000000'],[0.4,'#05020a'],[0.7,'#4a1020'],[0.9,'#f4a340'],[1,'#fffce0']], stars:true,  aurora:false, sun:'rising',  rim:'rgba(255,160,40,0.6)' },
            morning:     { label:"Direct Exposure", condition:"Solar Flare Warning", skyStops:[[0,'#000000'],[0.8,'#010205'],[1,'#050a14']], stars:true,  aurora:false, sun:'high',    rim:'rgba(255,255,255,0.1)' },
            golden:      { label:"Orbital Sunset",  condition:"Entry Window Open",  skyStops:[[0,'#000000'],[0.4,'#1a0a2e'],[0.6,'#d4602a'],[0.8,'#f0962a'],[1,'#ffdf80']], stars:true,  aurora:false, sun:'setting', rim:'rgba(255,120,30,0.5)' },
        };

        const BIG_DIPPER = [
            {x: 0.70, y: 0.15}, {x: 0.75, y: 0.18}, {x: 0.79, y: 0.22}, 
            {x: 0.83, y: 0.26}, {x: 0.88, y: 0.25}, {x: 0.90, y: 0.32}, {x: 0.84, y: 0.33}
        ];

        const AURORA_BANDS = [
            {y:.14,amp:50,freq:.0016,speed:.00022,color:[0,255,153],  w:160,phase:0  },
            {y:.10,amp:65,freq:.0013,speed:.00028,color:[180,79,255], w:190,phase:4.4},
            {y:.18,amp:55,freq:.0015,speed:.00020,color:[0,232,184],  w:150,phase:3.3},
        ];

        function lerp(a,b,s){return a+(b-a)*s;}
        function getAutoState(){const h=new Date().getHours();if(h>=22||h<5)return 'aurora';if(h<8)return 'sunrise';if(h>=19)return 'golden';return 'morning';}

        function SpaceCanvas({ skyState }) {
            const skyRef = useRef(null);
            const animRef = useRef(null);
            const stateRef = useRef(skyState);
            const tRef = useRef(0);
            const alphasRef = useRef({aurora:0,stars:0});
            const targetsRef = useRef({aurora:0,stars:0});

            useEffect(()=>{
                stateRef.current=skyState; 
                const s=SKY_STATES[skyState]; 
                targetsRef.current={aurora:s.aurora?1:0,stars:s.stars?1:0};
            },[skyState]);

            useEffect(()=>{
                const sky=skyRef.current; if(!sky)return;
                const sc=sky.getContext('2d');
                function resize(){ sky.width=window.innerWidth; sky.height=window.innerHeight; }
                resize(); window.addEventListener('resize',resize);

                function frame(){
                    const W=sky.width, H=sky.height;
                    const a=alphasRef.current, tg=targetsRef.current;
                    a.aurora=lerp(a.aurora,tg.aurora,0.02); a.stars=lerp(a.stars,tg.stars,0.02);
                    sc.clearRect(0,0,W,H);
                    
                    // Draw Sky
                    const s=SKY_STATES[stateRef.current];
                    const g=sc.createLinearGradient(0,0,0,H);
                    s.skyStops.forEach(([p,c])=>g.addColorStop(p,c));
                    sc.fillStyle=g; sc.fillRect(0,0,W,H);

                    // Draw Stars
                    if(a.stars > 0.02) {
                        const pts=[[.08,.06],[.15,.12],[.23,.04],[.31,.09],[.38,.03],[.45,.07],[.52,.14],[.61,.05],[.12,.18],[.28,.22],[.44,.16],[.58,.20],[.05,.25],[.35,.27],[.19,.30],[.50,.32],[.02,.16],[.47,.28]];
                        pts.forEach(([sx,sy],i)=>{
                            const tw=0.5+0.5*Math.sin(tRef.current*0.0008+i*1.3);
                            sc.beginPath(); sc.arc(sx*W,sy*H,0.8,0,Math.PI*2);
                            sc.fillStyle=`rgba(255,255,255,${a.stars*tw*0.6})`; sc.fill();
                        });
                        BIG_DIPPER.forEach((star, i) => {
                            const tw=0.7+0.3*Math.sin(tRef.current*0.0005+i);
                            sc.beginPath(); sc.arc(star.x*W, star.y*H, 1.2, 0, Math.PI*2);
                            sc.fillStyle=`rgba(255,255,255,${a.stars*tw})`; sc.fill();
                        });
                    }

                    // Draw Aurora
                    if(a.aurora > 0.02) {
                        AURORA_BANDS.forEach(b=>{
                            const cy=H*b.y; sc.beginPath(); sc.moveTo(0,cy);
                            for(let x=0;x<=W;x+=10){
                                const w=Math.sin(b.freq*x+b.phase+tRef.current*b.speed)*b.amp;
                                sc.lineTo(x,cy+w);
                            }
                            sc.strokeStyle=`rgba(${b.color[0]},${b.color[1]},${b.color[2]},${0.15*a.aurora})`;
                            sc.lineWidth=b.w; sc.stroke();
                        });
                    }

                    // Draw Sun
                    const sunType = SKY_STATES[stateRef.current].sun;
                    if(sunType) {
                        let sx,sy,sr,gr2,sc2;
                        if(sunType==='rising'){sx=W*.2;sy=H*.65;sr=25;gr2=120;sc2='rgba(255,200,100,1)';}
                        else if(sunType==='high'){sx=W*.8;sy=H*.2;sr=20;gr2=80;sc2='rgba(255,255,240,1)';}
                        else {sx=W*.15;sy=H*.7;sr=30;gr2=150;sc2='rgba(255,100,50,1)';}
                        const glow=sc.createRadialGradient(sx,sy,0,sx,sy,gr2);
                        glow.addColorStop(0,sc2.replace('1)','0.4)')); glow.addColorStop(1,'rgba(0,0,0,0)');
                        sc.fillStyle=glow; sc.fillRect(sx-gr2,sy-gr2,gr2*2,gr2*2);
                        sc.beginPath(); sc.arc(sx,sy,sr,0,Math.PI*2); sc.fillStyle=sc2; sc.fill();
                    }

                    // Draw Planet
                    sc.fillStyle='#000';
                    sc.beginPath();
                    sc.moveTo(0,H);
                    sc.bezierCurveTo(W*0.1, H*0.65, W*0.9, H*0.65, W, H);
                    sc.lineTo(W,H); sc.closePath(); sc.fill();
                    const rim=sc.createLinearGradient(0,H*0.6,0,H*0.8);
                    rim.addColorStop(0,s.rim); rim.addColorStop(1,'rgba(0,0,0,0)');
                    sc.strokeStyle=rim; sc.lineWidth=4; sc.stroke();

                    tRef.current+=16;
                    animRef.current=requestAnimationFrame(frame);
                }
                animRef.current=requestAnimationFrame(frame);
                return()=>{cancelAnimationFrame(animRef.current); window.removeEventListener('resize',resize);};
            },[]);

            return <canvas ref={skyRef} style={{display:'block'}}/>;
        }

        const App = () => {
            const skyState = getAutoState();
            const skyInfo = SKY_STATES[skyState];

            return (
                <div style={{position:'relative', width:'100%', height:'100%', overflow:'hidden', fontFamily:'sans-serif'}}>
                    <SpaceCanvas skyState={skyState}/>
                    <div style={{position:'absolute', inset:0, display:'flex', flexDirection:'column', justifyContent:'space-between', padding:'40px', pointerEvents:'none', color:'white'}}>
                        <div style={{display:'flex', justifyContent:'space-between', opacity:0.6, fontSize:'12px', letterSpacing:'0.1em'}}>
                            <span>LOCATION: LOW EARTH ORBIT</span>
                            <span>{new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit', hour12: false})}</span>
                        </div>
                        <div>
                            <h1 style={{fontSize:'48px', fontWeight:'200', margin:'0 0 10px 0', letterSpacing:'0.1em'}}>CHEZ PREFECT</h1>
                            <p style={{fontSize:'14px', opacity:0.5, margin:'0 0 30px 0', letterSpacing:'0.05em'}}>ESTABLISHING MULTIPLANETARY PRESENCE</p>
                            <div style={{display:'flex', gap:'20px', pointerEvents:'all'}}>
                                <button style={{background:'rgba(255,255,255,0.1)', border:'1px solid rgba(255,255,255,0.2)', color:'white', padding:'12px 24px', cursor:'pointer'}}>ENTER HUB</button>
                                <a href="mailto:hello@chezprefect.com" style={{color:'rgba(255,255,255,0.5)', textDecoration:'none', alignSelf:'center', fontSize:'13px'}}>CONTACT</a>
                            </div>
                        </div>
                        <div style={{fontSize:'10px', opacity:0.3}}>&copy; 2026 CHEZ PREFECT</div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
